{{ define "layout/app_shell" }}
<!doctype html>
<html lang="{{ .Locale }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="/static/css/base.css" />
  </head>
  <body>
    <header class="container header-bar">
      <div class="header-top">
        <h1>{{ t . "common.appName" }}</h1>
        <form method="post" action="/{{ .Locale }}/logout" class="logout-form">
          <button type="submit">{{ t . "common.actions.logout" }}</button>
        </form>
      </div>
      <p class="muted">{{ t . "common.status.signedIn" }}: {{ .User.Username }}</p>
      {{ template "partials/nav" . }}
    </header>
    <main class="container">
      {{ template "partials/flash" . }}
      {{ template "partials/render_content" . }}
    </main>
  </body>
</html>
{{ end }}
