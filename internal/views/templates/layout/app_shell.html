{{ define "layout/app_shell" }}
<!doctype html>
<html lang="{{ .Locale }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="/static/css/base.css" />
  </head>
  <body>
    <header class="container">
      <h1>{{ t . "common.appName" }}</h1>
      <p>{{ t . "common.status.signedIn" }}: {{ .User.Username }}</p>
      <form method="post" action="/{{ .Locale }}/logout">
        <button type="submit">{{ t . "common.actions.logout" }}</button>
      </form>
    </header>
    <main class="container">
      {{ template "partials/flash" . }}
      {{ template "partials/render_content" . }}
    </main>
  </body>
</html>
{{ end }}
