{{ define "pages/search.content" }}
<section class="search-page">
  <h2>{{ t . "search.title" }}</h2>

  <form
    class="search-form"
    method="get"
    action="/{{ .Locale }}/search"
    hx-get="/{{ .Locale }}/search"
    hx-target="#search-results"
    hx-push-url="true"
  >
    <div class="field">
      <label for="q">{{ t . "search.fields.query" }}</label>
      <input id="q" name="q" type="search" value="{{ .Values.q }}" autocomplete="off" />
    </div>
    <div class="field">
      <label for="media_type">{{ t . "search.fields.mediaType" }}</label>
      <select id="media_type" name="media_type" required>
        <option value="" {{ if eq .Values.media_type "" }}selected{{ end }}>{{ t . "search.fields.mediaTypePlaceholder" }}</option>
        {{ range .MediaTypes }}
        <option value="{{ . }}" {{ if eq $.Values.media_type . }}selected{{ end }}>{{ t $ (printf "library.mediatype.%s" .) }}</option>
        {{ end }}
      </select>
    </div>
    <input type="hidden" name="page_size" value="{{ if .Values.page_size }}{{ .Values.page_size }}{{ else }}10{{ end }}" />
    <button class="button-primary" type="submit">{{ t . "search.actions.submit" }}</button>
  </form>

  <div id="search-results" class="results-region" aria-live="polite">
    {{ template "partials/search_results" . }}
  </div>
</section>
{{ end }}

{{ define "pages/search.html" }}
{{ template "layout/app_shell" . }}
{{ end }}
