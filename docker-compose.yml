# Local development: MongoDB only. Run the Go app on the host (`./scripts/dev-web.sh`).
# Production Go container: use `docker-compose.prod.yml` (see Makefile `docker-prod-up`).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_HOST_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 })' | mongosh mongodb://127.0.0.1:27017/admin --quiet >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  mongo-data:
