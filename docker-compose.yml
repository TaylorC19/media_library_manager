services:
  deps:
    image: node:22-alpine
    working_dir: /workspace
    init: true
    environment:
      CI: "true"
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --no-frozen-lockfile --config.confirmModulesPurge=false"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store

  web:
    image: node:22-alpine
    working_dir: /workspace
    init: true
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter @media-library/web dev"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      INTERNAL_API_BASE_URL: http://api:4000
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      WEB_PORT: "3000"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: node:22-alpine
    working_dir: /workspace
    init: true
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm --filter @media-library/api dev"
    env_file:
      - .env
    environment:
      API_PORT: "4000"
      CHOKIDAR_USEPOLLING: "true"
      MONGODB_URL: mongodb://mongo:27017/media_library
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      deps:
        condition: service_completed_successfully
      mongo:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 })' | mongosh mongodb://127.0.0.1:27017/admin --quiet >/dev/null 2>&1 || exit 1"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  mongo-data:
  pnpm-store:
