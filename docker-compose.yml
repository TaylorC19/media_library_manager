services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @media-library/web dev"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      INTERNAL_API_BASE_URL: http://api:4000
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @media-library/api dev"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      MONGODB_URL: mongodb://mongo:27017/media_library
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
  pnpm-store:
