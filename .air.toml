root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go build -o ./tmp/air/web ./cmd/web"
entrypoint = "./tmp/air/web"
include_ext = ["go", "html", "css", "js", "json"]
exclude_dir = ["tmp", "node_modules", "apps", "dist", ".git", "docs", "packages", "web"]
exclude_regex = ["_test\\.go"]
delay = 500
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[misc]
clean_on_exit = true
