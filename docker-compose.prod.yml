services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      # Force embedded assets in container; see internal/config.UseEmbeddedAssets.
      APP_ENV: production
      PORT: "8080"
    ports:
      - "${PORT:-8080}:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-qO-",
          "http://127.0.0.1:8080/health",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  mongo:
    image: mongo:7
    profiles:
      - mongo
    restart: unless-stopped
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'db.adminCommand({ ping: 1 })' | mongosh mongodb://127.0.0.1:27017/admin --quiet >/dev/null 2>&1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  mongo-prod-data:
